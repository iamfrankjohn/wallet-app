name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS Archive
        run: flutter build ipa --release --no-codesign

      - name: Package unsigned IPA manually
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app \
            build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r WalletApp.ipa Payload/
          rm -rf Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: wallet-tracker-ipa
          path: build/ios/ipa/WalletApp.ipa
          if-no-files-found: error